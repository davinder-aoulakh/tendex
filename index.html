<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" media="(prefers-color-scheme: dark)" href="https://media.base44.com/images/public/69e23169311147ecf99b113d/d91cd1b61_T_BB.png" />
    <link rel="icon" type="image/png" media="(prefers-color-scheme: light)" href="https://media.base44.com/images/public/69e23169311147ecf99b113d/9e5ef92b4_T_LB.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>TendeX</title>
  </head>
  <script>
    (function() {
      try {
        var t = localStorage.getItem('tendex_theme');
        if (t === 'light' || t === 'dark') { document.documentElement.classList.add(t); return; }
      } catch(e) {}
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.classList.add('light');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
